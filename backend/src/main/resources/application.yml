spring:
  application:
    name: digital-complaint-management

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/digital_complaints?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 5
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:8080}

# JWT Configuration
app:
  jwt:
    secret: ${JWT_SECRET:myDefaultSuperSecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong2024}
    expiration-ms: 86400000  # 24 hours

  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# SLA Configuration
sla:
  deadline-hours: ${SLA_DEADLINE_HOURS:48}
  check-interval-ms: ${SLA_CHECK_INTERVAL:1800000}  # 30 minutes
